version: '3.9'
services:
  dotnet:
    container_name: dotnet
    image: discorddenver:latest
    build:
      context: ./
      dockerfile: ./Dockerfile
    restart: always
  lavalink:
    container_name: lavalink
    image: lavalink:latest
    build:
      context: ./
      dockerfile: ./Lavalink/Dockerfile
    restart: always
    ports:
      - '2333:2333'